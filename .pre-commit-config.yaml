# Enable once per clone:  pre-commit install
# Keeps completions/_mobinogi-window in sync with scripts/mobinogi-window.
repos:
  - repo: local
    hooks:
      - id: mabinogi-completion-sync
        name: completion in sync with script
        entry: scripts/check-completion-sync
        language: script
        pass_filenames: false
        files: '^(scripts/mobinogi-window|completions/_mobinogi-window)$'
